<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 2 - Visualización de datos</title>

    <style>
        @view-transition {
            navigation: auto;
        }
    </style>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>    
<body style="background-color: #121212; padding-bottom: 60px; border: 2px solid #b2b3b6; border-radius: 12px;">

    
    
    <div class = "Encabezado" style="align-items: center; justify-content: center; text-align: center;">
        <h4 style="color: #5f6578;">Visualización de datos: Práctica 2</h2>
        <h6 style="color: #5f6578;">Mariano Francisco Chacón Fernández</h3>

    </div>
    <hr style="border: none; border-top: 1px solid #5f6578; width: 100%;">

    <div class = "Encabezado" style="align-items: center; justify-content: center; text-align: center;">
        <h1 style="color: #928d85;">¿Cómo afectan los ponderadores a la inflación que percibo?</h2>
    </div>
    <!---  Recuadro ----->
    <div class="contenedor-recuadro">
        <div style="margin-left: 20px; margin-top: 20px;text-align: center;">
            <div class="controles">
                <label for="filtro-fecha" style="color: #ffffff;">Seleccionar Fecha:</label>
                
                <select id="filtro-fecha"></select>
            </div>

            <div class="filtros-ponderador" style="margin: 15px 0; display: flex; gap: 10px;justify-content: center;">
                <button class="btn-neon active" data-col="var_mens_pond_gral">General</button>
                <button class="btn-neon" data-col="var_mens_pond_prop">Propietario</button>
                <button class="btn-neon" data-col="var_mens_pond_inqui">Inquilino</button>
                <button class="btn-neon" data-col="var_mens_pond_ocupante">Ocupante</button>
            </div>
        </div>

        
        <div style="display: flex; gap: 40px; width: 100%; max-width: 1200px; margin: 0 auto; align-items: center; justify-content: space-between;">
            
            
            <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                
                <!-- Inflación nacional ponderador 2004-->
                
                <!-- Primer mapa -->
                <div class="container-fluid mt-2" style="width: 100%; opacity: 0.7;">
                    <div id="mapa" style="height: 450px; width: 100%;"></div>
                </div>
                
            </div>

                
            <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                <!-- Inflación nacional ponderador 2017-->

                <!-- mapa ponderaciones 17 -->
                <div class="container-fluid mt-5 contenedor-neon" style="flex: 1.6;">
                    <div id="mapaNuevo" style="height: 550px; width: 100%;"></div>
                </div>
            </div>
        </div>

    </div>

    <div class="contenedor-recuadro">
        <!-- Gráfico de carrera de líneas -->

        <div style="width: 100%; max-width: 1200px; margin: 20px auto 0 auto; padding-left: 12px; padding-top: 3px">
            <div class="controles-grafico">
                <label for="filtro-provincia" style="color: #ffffff; margin-right: 10px;">Filtrar por Provincia:</label>
                <select id="filtro-provincia"></select>
                <button id="btn-play-pausa" class="btn-neon" style="min-width: 80px; margin-left: 10px;">Pausa</button>
            </div>
        </div>

        <div class="container-fluid mt-4 contenedor-neon-oscuro" style="width: 100%; max-width: 1200px; margin: 0 auto;">
            <div id="graficoCarrera" style="height: 400px; width: 100%;"></div>
        </div>
    </div>

    <div class="contenedor-recuadro">
        <!-- Gráfico barras -->
        <div class="container-fluid mt-5 mb-15 contenedor-neon-oscuro" style="width: 100%; max-width: 1200px; margin: 0 auto;">
            <div id="graficoPonderadores" style="height: 400px; width: 100%;"></div>
        </div>
    </div>

    <a href="nueva_pagina.html" class="magico" style="text-decoration: none; display: inline-block;">
        ¿Qué hay detrás?
    </a>

    <!-- SCRIPTS -->
    <script src="echarts.min.js"></script>
    <script src="echarts-gl.min.js"></script>
    <script src="main.js"></script>
</body>
</html>

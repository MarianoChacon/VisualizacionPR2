<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 2 - Visualización de datos</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body background="black">

    <div class="controles">
        <label for="filtro-fecha">Seleccionar Fecha:</label>
        
        <select id="filtro-fecha"></select>
    </div>

    
    <div style="display: flex; gap: 40px; width: 100%; max-width: 1200px; margin: 0 auto; align-items: center; justify-content: space-between;">
        
        <!-- Primer mapa -->
        <div class="container mt-5" style="flex: 1;margin-right: auto; opacity: 0.7;">
            <div id="mapa" style="height: 450px; width: 100%;"></div>
        </div>
        
        <!-- Mapa nuevo -->
        <div class="container mt-5 contenedor-neon" style="flex: 1.6;">
            <div id="mapaNuevo" style="height: 550px; width: 100%;"></div>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="echarts.min.js"></script>
    <script src="echarts-gl.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
